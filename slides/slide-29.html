<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:13pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
.col{display:flex;flex-direction:column;align-items:center;width:128pt;transition:opacity .5s;}
.bar{width:78pt;border-radius:5pt 5pt 0 0;}
#play{border:1px solid var(--accent);background:#fff;color:var(--accent2);border-radius:7pt;padding:5pt 13pt;font-size:9.5pt;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 04-A</span><h4>이원 고정효과</h4></div><p class="pg">29 / 39</p></div>
  <div class="body">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;">
      <div>
        <h2 style="font-size:21pt;margin-bottom:4pt;">통제할수록 <span class="k1">답이 바뀐다</span></h2>
        <p style="font-size:10pt;color:var(--muted);">무엇을 통제하느냐에 따라 '소득 계수'가 달라진다 — 교란을 걷을수록 순효과에 근접.</p>
      </div>
      <button id="play" onclick="playSteps()">▶ 단계별로 보기</button>
    </div>
    <div style="flex:1;display:flex;align-items:flex-end;justify-content:center;gap:34pt;padding:14pt 0 4pt;">
      <div class="col">
        <p style="font-size:23pt;font-weight:800;color:var(--muted);line-height:1.3;">4.59</p>
        <div class="bar" style="height:150pt;background:#A9B8CC;margin-top:5pt;"></div>
        <p style="font-size:11pt;font-weight:700;color:var(--ink);margin-top:9pt;">Pooled</p>
        <p style="font-size:9pt;color:var(--muted);margin-top:2pt;">통제 없음</p>
      </div>
      <div class="col">
        <p style="font-size:23pt;font-weight:800;color:var(--accent);line-height:1.3;">3.54</p>
        <div class="bar" style="height:116pt;background:#5B8DEF;margin-top:5pt;"></div>
        <p style="font-size:11pt;font-weight:700;color:var(--ink);margin-top:9pt;">국가 FE</p>
        <p style="font-size:9pt;color:var(--muted);margin-top:2pt;">국가 고유차 통제</p>
      </div>
      <div class="col">
        <p style="font-size:23pt;font-weight:800;color:var(--accent2);line-height:1.3;">1.26</p>
        <div class="bar" style="height:42pt;background:#16243A;margin-top:5pt;"></div>
        <p style="font-size:11pt;font-weight:700;color:var(--ink);margin-top:9pt;">이원 FE</p>
        <p style="font-size:9pt;color:var(--muted);margin-top:2pt;">국가 + 연도 통제</p>
      </div>
    </div>
    <div style="margin-top:9pt;background:var(--surface2);border:1px solid var(--border);border-radius:8pt;padding:10pt 16pt;">
      <p style="font-size:11pt;color:var(--ink);font-weight:600;text-align:center;">4.59 → 3.54 → 1.26 &nbsp;·&nbsp; 이것이 <b class="k1">식별의 문제</b> — 통제를 더할수록 '소득의 진짜 효과'에 근접한다.</p>
    </div>
  </div>
  <script>
  var cols=document.querySelectorAll('.col');
  function playSteps(){
    cols.forEach(function(c){c.style.opacity='0.28';});
    var i=0;
    var t=setInterval(function(){
      if(i>=cols.length){clearInterval(t);return;}
      cols[i].style.opacity='1';
      i++;
    },820);
  }
  </script>
</body>
</html>
