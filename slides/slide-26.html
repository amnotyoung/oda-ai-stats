<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
.mono{font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,'Pretendard',monospace;}
table{width:100%;border-collapse:collapse;}
td,th{text-align:left;padding:7pt 12pt;vertical-align:middle;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 03</span><h4>교차검증</h4></div><p class="pg">26 / 39</p></div>
  <div class="body" style="justify-content:center;">
    <h1 style="font-size:30pt;line-height:1.3;margin-bottom:6pt;">숫자는 <span class="k1">같다.</span> 출력 모양만 다르다.</h1>
    <p style="font-size:11.5pt;color:var(--muted);margin-bottom:16pt;">두 도구의 결과가 같으면 신뢰, 다르면 하나가 틀린 것 — 이것이 <b>교차검증</b>이다.</p>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:11pt;padding:6pt 10pt;">
      <table>
        <thead><tr style="border-bottom:1.5pt solid var(--ink);">
          <th style="font-size:9.5pt;color:var(--muted);font-weight:700;width:40%;">지표</th>
          <th style="font-size:9.5pt;color:var(--accent);font-weight:800;width:30%;">Python</th>
          <th style="font-size:9.5pt;color:var(--navy);font-weight:800;width:30%;">STATA</th>
        </tr></thead>
        <tbody>
          <tr style="border-bottom:1px solid var(--border);"><td style="font-size:11pt;color:var(--ink);font-weight:600;">회귀 계수 (log_gdp)</td><td class="mono" style="font-size:11pt;font-weight:700;color:var(--ink);">4.59</td><td class="mono" style="font-size:11pt;font-weight:700;color:var(--ink);">4.59</td></tr>
          <tr style="border-bottom:1px solid var(--border);"><td style="font-size:11pt;color:var(--ink);font-weight:600;">설명력 R²</td><td class="mono" style="font-size:11pt;font-weight:700;color:var(--ink);">0.68</td><td class="mono" style="font-size:11pt;font-weight:700;color:var(--ink);">0.68</td></tr>
          <tr><td style="font-size:11pt;color:var(--ink);font-weight:600;">ANOVA F</td><td class="mono" style="font-size:11pt;font-weight:700;color:var(--ink);">1877</td><td class="mono" style="font-size:11pt;font-weight:700;color:var(--ink);">1877</td></tr>
        </tbody>
      </table>
    </div>
    <div style="margin-top:14pt;display:flex;align-items:center;gap:10pt;">
      <p style="font-size:13pt;line-height:1.3;">✅</p>
      <p style="font-size:11pt;color:var(--ink);font-weight:600;">세 지표 모두 일치 → <b class="k1">신뢰할 수 있다.</b> 도구는 달라도 정답은 하나.</p>
    </div>
  </div>
</body>
</html>
