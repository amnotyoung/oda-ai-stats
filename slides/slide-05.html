<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
</style>
</head>
<body style="background:#16243A;padding:32pt 42pt;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:center;gap:10pt;">

    </div>

  </div>

  </div>
  <div style="display:flex;gap:11pt;">
    <div style="flex:1;background:#1E3050;border-radius:7pt;padding:11pt 14pt;">
      <p style="font-size:9pt;color:#7DB0FF;font-weight:700;margin-bottom:4pt;">STEP 1</p>
      <p style="font-size:10.5pt;color:#E2EAF4;font-weight:600;">한 문장으로 끝내는 차이</p>
    </div>
    <div style="flex:1;background:#1E3050;border-radius:7pt;padding:11pt 14pt;">
      <p style="font-size:9pt;color:#7DB0FF;font-weight:700;margin-bottom:4pt;">STEP 2</p>
      <p style="font-size:10.5pt;color:#E2EAF4;font-weight:600;">7가지 실제 차이</p>
    </div>
    <div style="flex:1;background:#1E3050;border-radius:7pt;padding:11pt 14pt;">
      <p style="font-size:9pt;color:#7DB0FF;font-weight:700;margin-bottom:4pt;">STEP 3</p>
      <p style="font-size:10.5pt;color:#E2EAF4;font-weight:600;">AI가 게임을 바꿨다</p>
    </div>
  </div>
</body>
</html>
