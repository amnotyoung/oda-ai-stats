<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;
  --accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;
  --code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;
  --ok:#15A34A;--bad:#DC2626;--ok-bg:#E9F7EF;--bad-bg:#FBEDED;
}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.15;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.mono{font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,'Pretendard',monospace;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.badge.gh{background:var(--soft);color:var(--accent2);}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:9pt;}
.tag{display:inline-block;padding:2.5pt 7pt;border-radius:4pt;font-size:8pt;font-weight:700;letter-spacing:0.02em;}
.lbl{font-size:8.5pt;color:var(--muted);font-weight:700;letter-spacing:0.03em;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 0</span><h4>오프닝</h4></div><p class="pg">02 / 39</p></div>
  <div class="body" style="justify-content:center;">
    <p style="font-size:13pt;color:var(--muted);font-weight:600;margin-bottom:13pt;">오늘 우리는 —</p>
    <h1 style="font-size:33pt;line-height:1.3;">회귀 · 교차표 · 패널 분석을 <span class="k1">직접</span> 돌립니다.<br>단, 문법은 한 줄도 <span class="k1">외우지 않습니다.</span></h1>
    <div class="card" style="margin-top:26pt;padding:17pt 19pt;border-left:4pt solid var(--accent);display:flex;gap:15pt;align-items:flex-start;">
      <p style="font-size:23pt;line-height:1.35;">📦</p>
      <div>
        <p style="font-size:9pt;color:var(--accent2);font-weight:700;letter-spacing:0.04em;margin-bottom:5pt;">오늘의 약속</p>
        <p style="font-size:14pt;color:var(--ink);font-weight:600;line-height:1.65;">강의가 끝나면 <b>폐쇄망 STATA에서 바로 돌아가는 코드 꾸러미</b>를 손에 쥐고 돌아갑니다.</p>
      </div>
    </div>
  </div>
</body>
</html>
