<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;
  --accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;
  --code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;
  --ok:#15A34A;--bad:#DC2626;--ok-bg:#E9F7EF;--bad-bg:#FBEDED;
}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.15;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
</style>
</head>
<body style="background:#16243A;padding:34pt 42pt;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <p style="font-size:10pt;letter-spacing:0.05em;color:#9DB4D4;font-weight:700;">사내 실무 강의 · 180분 집중</p>
    <p style="font-size:9.5pt;letter-spacing:0.06em;color:#9DB4D4;font-weight:700;">WORLD BANK WDI · 실데이터</p>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <div style="width:44pt;height:4pt;background:#60A5FA;border-radius:2pt;margin-bottom:18pt;"></div>
    <h1 style="font-size:54pt;font-weight:800;color:#ffffff;line-height:1.22;letter-spacing:-0.03em;">데이터 고급 통계<br>분석 실무 활용</h1>
    <p style="font-size:15pt;color:#C7D6EC;margin-top:18pt;font-weight:500;line-height:1.5;">AI로 통계 분석의 <b style="color:#fff;">난이도를 낮춘다</b> — 외부망에서 배우고, 폐쇄망 STATA로 현업에 적용</p>
  </div>
  <div style="display:flex;gap:20pt;border-top:1px solid #314861;padding-top:14pt;">
    <div style="flex:1;"><p style="font-size:8.5pt;color:#7E97B8;font-weight:600;margin-bottom:4pt;letter-spacing:0.02em;">데이터</p><p style="font-size:11pt;color:#EAF1FB;font-weight:600;">WDI 패널 · 217국×23년</p></div>
    <div style="flex:1;"><p style="font-size:8.5pt;color:#7E97B8;font-weight:600;margin-bottom:4pt;letter-spacing:0.02em;">대상</p><p style="font-size:11pt;color:#EAF1FB;font-weight:600;">Python·STATA 입문 동료</p></div>
    <div style="flex:1;"><p style="font-size:8.5pt;color:#7E97B8;font-weight:600;margin-bottom:4pt;letter-spacing:0.02em;">핵심 도구</p><p style="font-size:11pt;color:#EAF1FB;font-weight:600;">생성형 AI · Python · STATA</p></div>
    <div style="flex:1;"><p style="font-size:8.5pt;color:#7E97B8;font-weight:600;margin-bottom:4pt;letter-spacing:0.02em;">최종 산출물</p><p style="font-size:11pt;color:#EAF1FB;font-weight:600;">폐쇄망 STATA 코드 꾸러미</p></div>
  </div>
</body>
</html>
