<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>데이터 고급 통계 분석 실무 활용 — 슬라이드</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#0e0e0e;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard',sans-serif;}
  .nav-bar{height:48px;background:#1a1a1a;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;position:relative;z-index:10;}
  .nav-bar button{background:#333;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:13px;font-family:inherit;cursor:pointer;transition:background .15s;}
  .nav-bar button:hover{background:#555;}
  .nav-bar button:disabled{opacity:.3;cursor:default;}
  .slide-counter{color:#cfcfcf;font-size:13px;font-weight:600;min-width:64px;text-align:center;}
  .nav-bar a.btn-pdf{background:#2563EB;color:#fff;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:600;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:background .15s;}
  .nav-bar a.btn-pdf:hover{background:#1d4ed8;}
  .stage{position:absolute;top:48px;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .scaler{width:960px;height:540px;transform-origin:center center;flex-shrink:0;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  #frame{width:960px;height:540px;border:none;display:block;background:#fff;}
</style>
</head>
<body>
  <div class="nav-bar">
    <button id="prev" title="이전 (←)">‹ Prev</button>
    <span class="slide-counter" id="counter">1 / 39</span>
    <button id="next" title="다음 (→ / Space)">Next ›</button>
    <button id="fs" title="전체화면 (F)">&#x26F6;</button>
    <a class="btn-pdf" href="lecture-deck.pdf" download="데이터고급통계분석_강의덱.pdf" title="PDF로 저장 (39장)">&#x2193; PDF</a>
  </div>
  <div class="stage" id="stage">
    <div class="scaler" id="scaler">
      <iframe id="frame" src="slide-01.html" title="slide"></iframe>
    </div>
  </div>
  <script>
    var N = 39, cur = 1;
    var frame = document.getElementById('frame');
    var counter = document.getElementById('counter');
    var prevBtn = document.getElementById('prev');
    var nextBtn = document.getElementById('next');
    function pad(n){ return String(n).padStart(2,'0'); }
    function go(n){
      cur = Math.max(1, Math.min(N, n));
      frame.src = 'slide-' + pad(cur) + '.html';
      counter.textContent = cur + ' / ' + N;
      prevBtn.disabled = (cur === 1);
      nextBtn.disabled = (cur === N);
      try { location.hash = '#' + cur; } catch(e){}
    }
    prevBtn.onclick = function(){ go(cur - 1); };
    nextBtn.onclick = function(){ go(cur + 1); };
    document.getElementById('fs').onclick = function(){
      if (!document.fullscreenElement) { (document.documentElement.requestFullscreen||function(){})(); }
      else { (document.exitFullscreen||function(){})(); }
    };
    document.addEventListener('keydown', function(e){
      if (e.key === 'ArrowLeft') go(cur - 1);
      else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(cur + 1); }
      else if (e.key === 'f' || e.key === 'F') document.getElementById('fs').onclick();
    });
    function fit(){
      var s = Math.min(window.innerWidth / 960, (window.innerHeight - 48) / 540);
      document.getElementById('scaler').style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    var start = parseInt((location.hash||'').replace('#',''), 10);
    fit();
    go(start >= 1 && start <= N ? start : 1);
  </script>
</body>
</html>
