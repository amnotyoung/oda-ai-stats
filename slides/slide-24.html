<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:9pt;}
#tg{display:inline-flex;border:1px solid var(--border);border-radius:7pt;overflow:hidden;}
#tg button{border:none;background:#fff;padding:5pt 13pt;font-size:9.5pt;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;}
#tg button.on{background:var(--accent);color:#fff;}
circle.dot{transition:cx .6s cubic-bezier(.4,0,.2,1);}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 03</span><h4>③ 회귀 설계</h4></div><p class="pg">24 / 39</p></div>
  <div class="body">
    <h2 style="font-size:21pt;margin-bottom:3pt;">③ 회귀 설계 — <span class="k1">왜 로그변환?</span></h2>
    <p style="font-size:10pt;color:var(--muted);margin-bottom:7pt;">선형회귀는 <b>'직선' 관계</b>를 가정한다. 휘어 있는 관계를 펴려고 로그를 씌운다.</p>
    <div style="flex:1;display:grid;grid-template-columns:1.5fr 1fr;gap:15pt;">
      <div class="card" style="padding:8pt 11pt 6pt;display:flex;flex-direction:column;">
        <div style="display:flex;justify-content:center;margin-bottom:5pt;">
          <div id="tg">
            <button id="b0" class="on" onclick="setMode(0)">소득 (원본)</button>
            <button id="b1" onclick="setMode(1)">log(소득)</button>
          </div>
        </div>
        <svg id="sc" viewBox="0 0 330 192" style="width:100%;flex:1;">
          <line x1="38" y1="166" x2="322" y2="166" stroke="#C9D4E2" stroke-width="1.3"/>
          <line x1="38" y1="12" x2="38" y2="166" stroke="#C9D4E2" stroke-width="1.3"/>
          <text id="xlab" x="180" y="184" text-anchor="middle" font-size="8.5" fill="#6B7C90" font-family="Pretendard">소득 (1인당 GDP, US$) →</text>
          <text x="13" y="89" text-anchor="middle" font-size="8.5" fill="#6B7C90" font-family="Pretendard" transform="rotate(-90 13 89)">기대수명 →</text>
          <path id="trend" fill="none" stroke="#2563EB" stroke-width="1.8" opacity="0.85"/>
          <g id="pts"></g>
        </svg>
      </div>
      <div style="display:flex;flex-direction:column;justify-content:center;gap:9pt;">
        <div class="card" style="padding:11pt 13pt;">
          <p style="font-size:10pt;color:var(--ink);font-weight:800;margin-bottom:3pt;">📈 휜 관계</p>
          <p style="font-size:9.5pt;line-height:1.5;">소득↔기대수명은 저소득서 <b>급증</b>, 고소득서 <b>평평</b>(Preston 곡선) — 직선이 아니다.</p>
        </div>
        <div class="card" style="padding:11pt 13pt;background:#EEF4FF;border-color:#BFD4F5;">
          <p style="font-size:10pt;color:var(--accent2);font-weight:800;margin-bottom:3pt;">📐 펴기 = 선형화</p>
          <p style="font-size:9.5pt;line-height:1.5;"><b>log(소득)</b>으로 바꾸면 거의 <b>직선</b> → 선형회귀에 딱 맞는다.</p>
        </div>
        <p style="font-size:8.8pt;color:var(--muted);line-height:1.45;">+ 분포 쏠림·이상치 영향 완화, % 해석은 <b>덤</b>.</p>
      </div>
    </div>
    <div style="margin-top:8pt;background:var(--navy);border-radius:8pt;padding:9pt 16pt;">
      <p style="font-size:10.5pt;color:#EAF1FB;font-weight:600;line-height:1.45;">AI는 이걸 <b style="color:#fff;">자동으로 안 할 수 있다.</b> "관계가 휘었으니 로그를 씌우자"는 데이터를 아는 사람의 판단 — <b style="color:#7DB0FF;">설계는 사람 몫.</b></p>
    </div>
  </div>
  <script src="./assets/wdi2021.js"></script>
  <script>
  (function(){
    var NS="http://www.w3.org/2000/svg";
    var D=(window.WDI2021||[]);
    var W=330,H=192,padL=38,padR=10,padT=12,padB=26;
    var gMax=(D.length?Math.max.apply(null,D.map(function(d){return d.gdp;}))*1.03:140000), lgMin=5.3,lgMax=12.6, leMin=37,leMax=87;
    var mode=0;
    function sx(d){ return mode ? padL+(d.lg-lgMin)/(lgMax-lgMin)*(W-padL-padR) : padL+(d.gdp/gMax)*(W-padL-padR); }
    function sy(v){ return (H-padB)-(v-leMin)/(leMax-leMin)*(H-padT-padB); }
    var pts=document.getElementById("pts"), trend=document.getElementById("trend"), xlab=document.getElementById("xlab");
    var items=[];
    D.forEach(function(d){
      var c=document.createElementNS(NS,"circle");
      c.setAttribute("r","2.4"); c.setAttribute("fill","#9FBBDD"); c.setAttribute("class","dot");
      c.setAttribute("cy",sy(d.life).toFixed(1)); c.setAttribute("cx",sx(d).toFixed(1));
      pts.appendChild(c); items.push({el:c,d:d});
    });
    function trendPath(){
      var s=D.slice().sort(function(a,b){return mode?(a.lg-b.lg):(a.gdp-b.gdp);});
      var pp=[];
      for(var i=0;i<s.length;i+=8){var seg=s.slice(i,i+18);if(!seg.length)continue;
        var mx=seg.reduce(function(t,d){return t+sx(d);},0)/seg.length;
        var my=seg.reduce(function(t,d){return t+sy(d.life);},0)/seg.length;
        pp.push([mx,my]);}
      return pp.length?("M"+pp.map(function(p){return p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" L")):"";
    }
    function render(){
      items.forEach(function(o){o.el.setAttribute("cx",sx(o.d).toFixed(1));});
      trend.setAttribute("d",trendPath());
      xlab.textContent= mode? "소득 (log 1인당 GDP) →" : "소득 (1인당 GDP, US$) →";
      document.getElementById("b0").className=mode?"":"on";
      document.getElementById("b1").className=mode?"on":"";
    }
    window.setMode=function(m){ mode=m; render(); };
    render();
  })();
  </script>
</body>
</html>
