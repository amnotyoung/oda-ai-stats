<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
table{width:100%;border-collapse:collapse;}
td,th{text-align:left;padding:11pt 12pt;vertical-align:middle;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 05</span><h4>3대 무기 종합</h4></div><p class="pg">38 / 43</p></div>
  <div class="body">
    <h2 style="font-size:22pt;margin-bottom:4pt;">인간의 <span class="k1">3대 무기</span> — 종합</h2>
    <p style="font-size:10.5pt;color:var(--muted);margin-bottom:13pt;">AI는 빠르지만 보지 못하고, 맥락이 없고, 혼자 일한다.</p>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:11pt;padding:3pt 12pt;">
        <table>
          <thead><tr style="border-bottom:1.5pt solid var(--ink);">
            <th style="font-size:9.5pt;color:var(--muted);font-weight:700;width:26%;">무기</th>
            <th style="font-size:9.5pt;color:var(--bad);font-weight:700;width:37%;">AI의 약점</th>
            <th style="font-size:9.5pt;color:var(--ok);font-weight:700;width:37%;">인간의 강점</th>
          </tr></thead>
          <tbody>
            <tr style="border-bottom:1px solid var(--border);">
              <td style="font-size:12pt;color:var(--ink);font-weight:700;">🖼️ 시각화</td>
              <td style="font-size:10.5pt;color:var(--ink2);">숫자만 보고 이상치를 놓침</td>
              <td style="font-size:10.5pt;color:var(--ink);font-weight:600;">그림으로 보면 오류가 보인다</td>
            </tr>
            <tr style="border-bottom:1px solid var(--border);">
              <td style="font-size:12pt;color:var(--ink);font-weight:700;">🧭 도메인 지식</td>
              <td style="font-size:10.5pt;color:var(--ink2);">현장의 사실(ground truth)을 모름</td>
              <td style="font-size:10.5pt;color:var(--ink);font-weight:600;">"그럴 리 없다"를 안다</td>
            </tr>
            <tr>
              <td style="font-size:12pt;color:var(--ink);font-weight:700;">👥 동료 회람</td>
              <td style="font-size:10.5pt;color:var(--ink2);">혼자, 진공 상태에서 답함</td>
              <td style="font-size:10.5pt;color:var(--ink);font-weight:600;">여러 눈으로 함께 잡는다</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div style="margin-top:13pt;background:var(--navy);border-radius:8pt;padding:12pt 16pt;">
      <p style="font-size:11.5pt;color:#EAF1FB;font-weight:700;text-align:center;">AI로 난이도를 낮추고, 이 <span style="color:#7DB0FF;">세 무기</span>로 신뢰도를 높인다.</p>
    </div>
  </div>
</body>
</html>
