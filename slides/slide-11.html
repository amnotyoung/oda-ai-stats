<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:13pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
table{width:100%;border-collapse:collapse;}
td,th{text-align:left;padding:6.5pt 10pt;vertical-align:middle;}
tbody td{font-size:10.5pt;color:var(--ink2);}
tbody td:first-child{font-weight:700;color:var(--muted);font-size:9.5pt;width:16%;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 01</span><h4>Python vs STATA</h4></div><p class="pg">11 / 40</p></div>
  <div class="body">
    <h2 style="font-size:22pt;margin-bottom:3pt;">도입 한 장 요약 <span style="font-size:13pt;color:var(--muted);font-weight:600;">— 사진 찍어두세요</span></h2>
    <p style="font-size:10pt;color:var(--muted);margin-bottom:10pt;">한 줄로 정리하면 이렇다.</p>
    <table>
      <thead>
        <tr style="border-bottom:1.5pt solid var(--ink);">
          <th style="width:16%;"></th>
          <th style="font-size:10pt;color:var(--navy);font-weight:800;width:42%;">STATA</th>
          <th style="font-size:10pt;color:var(--accent);font-weight:800;width:42%;">Python</th>
        </tr>
      </thead>
      <tbody>
        <tr style="border-bottom:1px solid var(--border);"><td>한마디</td><td>통계 전용 소프트웨어</td><td>범용 프로그래밍 언어</td></tr>
        <tr style="border-bottom:1px solid var(--border);"><td>잘하는 것</td><td>통계 분석에 특화 — 명령이 간결</td><td>수집·자동화·ML·배포까지 무엇이든</td></tr>
        <tr style="border-bottom:1px solid var(--border);"><td>비용</td><td>유료</td><td>무료</td></tr>
        <tr style="background:var(--soft);border-bottom:1px solid var(--border);"><td style="color:var(--accent2);">학습곡선 ★</td><td style="color:var(--ink);font-weight:600;">낮음</td><td style="color:var(--ink);font-weight:600;">높음 → <b class="k1">AI가 무력화</b></td></tr>
        <tr><td>현업 환경</td><td>폐쇄망에 설치됨 (실행)</td><td>외부망 학습·비교용 (폐쇄망엔 없음)</td></tr>
      </tbody>
    </table>
    <div style="margin-top:13pt;background:var(--navy);border-radius:8pt;padding:12pt 16pt;">
      <p style="font-size:11pt;color:#EAF1FB;font-weight:600;line-height:1.5;"><b style="color:#7DB0FF;">오늘의 전략</b> &nbsp;·&nbsp; 외부망에서 AI로 배우고 → <b style="color:#fff;">폐쇄망 STATA 코드 꾸러미</b>로 변환 → 인간이 검증한다</p>
    </div>
  </div>
</body>
</html>
