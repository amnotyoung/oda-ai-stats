<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--bonus:#0E7490;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:9pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--bonus);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.05em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">BONUS</span><h4>영향평가 보고서 독해</h4></div><p class="pg">43 / 43</p></div>
  <div class="body">
    <h2 style="font-size:20pt;margin-bottom:3pt;">그 표, <span class="k1">이렇게 읽는다</span></h2>
    <p style="font-size:9.3pt;color:var(--muted);margin-bottom:8pt;">〈표 4-1c〉 베트남 적응조치의 효과 (내생적교체회귀 ESR) — 실제 보고서의 표 전체.</p>
    <div style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;">
      <img src="./assets/koica-table.png" style="max-width:100%;max-height:100%;width:auto;height:auto;border:1px solid var(--border);border-radius:4pt;box-shadow:0 2pt 9pt rgba(22,36,58,0.13);">
    </div>
    <div style="margin-top:9pt;background:var(--navy);border-radius:8pt;padding:9pt 16pt;flex-shrink:0;">
      <p style="font-size:9.3pt;color:#EAF1FB;font-weight:500;line-height:1.5;"><b style="color:#7DB0FF;">읽는 법</b> — 숫자 = <b style="color:#fff;">계수</b>(효과 크기·방향, 양수면 ↑) · (괄호) = <b style="color:#fff;">표준오차</b> · <b style="color:#fff;">별 ***</b> = 매우 유의(p&lt;0.01) · <b style="color:#fff;">ATT</b> = 적응조치 '<b style="color:#fff;">때문에</b>' 생긴 효과. — 계수·별표·처치효과, 전부 <b style="color:#7DB0FF;">오늘 배운 것</b>이다.</p>
    </div>
  </div>
</body>
</html>
