<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 02</span><h4>AI로 첫 분석</h4></div><p class="pg">18 / 39</p></div>
  <div class="body">
    <div style="display:flex;align-items:center;gap:10pt;margin-bottom:4pt;">
      <span style="display:inline-block;padding:3.5pt 9pt;background:#F4C36B;color:#5A4410;border-radius:5pt;font-size:9pt;font-weight:800;">★ 가장 중요</span>
      <h2 style="font-size:21pt;">폐쇄망 실행용 프롬프트</h2>
    </div>
    <p style="font-size:10.5pt;color:var(--muted);margin-bottom:13pt;">이 한 가지가 외부망 학습을 현업 실행으로 잇는다.</p>
    <div style="flex:1;background:var(--navy);border-radius:11pt;padding:20pt 24pt;display:flex;flex-direction:column;justify-content:center;border-left:5pt solid var(--accent);">
      <p style="font-size:11pt;color:#7DB0FF;font-weight:700;margin-bottom:11pt;">💬 AI에게 이렇게 시킨다</p>
      <p style="font-size:15.5pt;color:#F2F6FC;font-weight:600;line-height:1.65;">"이 STATA 코드를 추가 패키지(SSC) 없이 <b style="color:#fff;">base STATA만으로, 인터넷 없이</b> 오프라인에서 돌아가게 짜줘. <b style="color:#fff;">경로·변수명은 파일 맨 위에</b> 모아 한 곳만 바꾸면 되게."</p>
    </div>
    <div style="margin-top:13pt;display:grid;grid-template-columns:1fr 1fr 1fr;gap:11pt;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8pt;padding:10pt 13pt;"><p style="font-size:10.5pt;color:var(--ink);font-weight:600;"><b style="color:var(--ok);">✓</b> SSC 패키지 불필요</p></div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8pt;padding:10pt 13pt;"><p style="font-size:10.5pt;color:var(--ink);font-weight:600;"><b style="color:var(--ok);">✓</b> 인터넷 없이 오프라인</p></div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8pt;padding:10pt 13pt;"><p style="font-size:10.5pt;color:var(--ink);font-weight:600;"><b style="color:var(--ok);">✓</b> STATA 19 MP (우리 환경)</p></div>
    </div>
  </div>
</body>
</html>
