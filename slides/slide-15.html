<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:9pt;}
#tip{position:absolute;display:none;background:var(--navy);color:#fff;border-radius:6pt;padding:5pt 9pt;font-size:9pt;font-weight:600;pointer-events:none;white-space:nowrap;z-index:5;box-shadow:0 2pt 8pt rgba(0,0,0,0.18);}
.dot{cursor:pointer;transition:r .1s;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 02</span><h4>데이터 소개</h4></div><p class="pg">15 / 39</p></div>
  <div class="body">
    <h2 style="font-size:20pt;margin-bottom:3pt;">개발의 스펙트럼 — <span class="k1">Preston 곡선</span></h2>
    <p style="font-size:10pt;color:var(--muted);margin-bottom:11pt;">2021년 210개국. 한 점 = 한 나라. <b>점에 마우스를 올려보세요.</b></p>
    <div style="flex:1;display:grid;grid-template-columns:1.55fr 1fr;gap:15pt;">
      <div class="card" style="padding:8pt 10pt 4pt;position:relative;display:flex;flex-direction:column;">
        <svg viewBox="0 0 330 196" style="width:100%;flex:1;">
          <line x1="34" y1="172" x2="322" y2="172" stroke="#C9D4E2" stroke-width="1.3"/>
          <line x1="34" y1="14" x2="34" y2="172" stroke="#C9D4E2" stroke-width="1.3"/>
          <text x="178" y="190" text-anchor="middle" font-size="8.5" fill="#6B7C90" font-family="Pretendard">소득 (log 1인당 GDP) →</text>
          <text x="12" y="95" text-anchor="middle" font-size="8.5" fill="#6B7C90" font-family="Pretendard" transform="rotate(-90 12 95)">기대수명 →</text>
          <path id="trend" fill="none" stroke="#93B4E8" stroke-width="1.6" stroke-dasharray="4 3" opacity="0.8"/>
          <g id="pts"></g>
          <g id="labels"></g>
        </svg>
        <div id="tip"></div>
      </div>
      <div style="display:flex;flex-direction:column;justify-content:center;gap:10pt;">
        <div class="card" style="padding:11pt 13pt;background:#EEF4FF;border-color:#BFD4F5;">
          <p style="font-size:10pt;color:var(--accent2);font-weight:800;margin-bottom:4pt;">📈 Preston 곡선</p>
          <p style="font-size:9.5pt;line-height:1.5;">소득과 기대수명의 관계(S. Preston, 1975). 저소득 구간에선 소득이 조금만 늘어도 수명이 <b>급증</b>, 고소득에선 <b>완만</b>해진다.</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:6pt;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:4pt;"><p style="font-size:10pt;font-weight:700;color:var(--ink);">🇪🇹 에티오피아</p><p style="font-size:9.5pt;color:var(--muted);">$893 · 65세</p></div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:4pt;"><p style="font-size:10pt;font-weight:700;color:var(--ink);">🇻🇳 베트남</p><p style="font-size:9.5pt;color:var(--muted);">$3,704 · 74세</p></div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;"><p style="font-size:10pt;font-weight:700;color:var(--ink);">🇰🇷 한국</p><p style="font-size:9.5pt;color:var(--muted);">$37,518 · 84세</p></div>
        </div>
      </div>
    </div>
  </div>
  <script src="./assets/wdi2021.js"></script>
  <script>
  (function(){
    var NS="http://www.w3.org/2000/svg";
    var D=(window.WDI2021||[]);
    var padL=34,padR=8,padT=14,padB=24,W=330,H=196;
    var lgMin=5.4,lgMax=12.6,leMin=37,leMax=87;
    function sx(v){return padL+(v-lgMin)/(lgMax-lgMin)*(W-padL-padR);}
    function sy(v){return (H-padB)-(v-leMin)/(leMax-leMin)*(H-padT-padB);}
    var HI={ETH:"에티오피아",VNM:"베트남",KOR:"한국"};
    var pts=document.getElementById("pts"), labels=document.getElementById("labels"), tip=document.getElementById("tip");
    D.forEach(function(d){
      var hi=HI[d.code];
      var c=document.createElementNS(NS,"circle");
      c.setAttribute("cx",sx(d.lg).toFixed(1)); c.setAttribute("cy",sy(d.life).toFixed(1));
      c.setAttribute("r",hi?4.2:2.5); c.setAttribute("class","dot");
      c.setAttribute("fill",hi?"#1D4ED8":"#9FBBDD");
      if(hi){c.setAttribute("stroke","#fff");c.setAttribute("stroke-width","1");}
      c.addEventListener("mouseenter",function(e){
        tip.style.display="block";
        tip.textContent=d.name+" · $"+d.gdp.toLocaleString()+" · "+d.life+"세";
        var box=tip.parentElement.getBoundingClientRect();
        tip.style.left=(e.clientX-box.left+8)+"px"; tip.style.top=(e.clientY-box.top-6)+"px";
        c.setAttribute("r",hi?5.4:4); c.setAttribute("fill","#2563EB");
      });
      c.addEventListener("mousemove",function(e){var box=tip.parentElement.getBoundingClientRect();tip.style.left=(e.clientX-box.left+8)+"px";tip.style.top=(e.clientY-box.top-6)+"px";});
      c.addEventListener("mouseleave",function(){tip.style.display="none";c.setAttribute("r",hi?4.2:2.5);c.setAttribute("fill",hi?"#1D4ED8":"#9FBBDD");});
      pts.appendChild(c);
    });
    Object.keys(HI).forEach(function(code){
      var d=D.find(function(x){return x.code===code;}); if(!d)return;
      var t=document.createElementNS(NS,"text");
      t.setAttribute("x",(sx(d.lg)+ (code==="KOR"?-3:6)).toFixed(1)); t.setAttribute("y",(sy(d.life)-6).toFixed(1));
      t.setAttribute("text-anchor",code==="KOR"?"end":"start");
      t.setAttribute("font-size","8.5"); t.setAttribute("font-weight","700"); t.setAttribute("fill","#1D4ED8"); t.setAttribute("font-family","Pretendard");
      t.textContent=HI[code]; labels.appendChild(t);
    });
    // 추세선(이동평균)
    var sorted=D.slice().sort(function(a,b){return a.lg-b.lg;});
    var pathPts=[];
    for(var i=0;i<sorted.length;i+=12){
      var seg=sorted.slice(i,i+18); if(!seg.length)continue;
      var mx=seg.reduce(function(s,d){return s+d.lg;},0)/seg.length;
      var my=seg.reduce(function(s,d){return s+d.life;},0)/seg.length;
      pathPts.push([sx(mx),sy(my)]);
    }
    if(pathPts.length){var dd="M"+pathPts.map(function(p){return p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" L");document.getElementById("trend").setAttribute("d",dd);}
  })();
  </script>
</body>
</html>
