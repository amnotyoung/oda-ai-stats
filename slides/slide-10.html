<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:9pt;}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 01</span><h4>Python vs STATA</h4></div><p class="pg">10 / 39</p></div>
  <div class="body">
    <h2 style="font-size:22pt;margin-bottom:4pt;">반전 — <span class="k1">AI가 게임을 바꿨다</span></h2>
    <p style="font-size:10.5pt;color:var(--muted);margin-bottom:13pt;">입문자의 가장 큰 장벽은 늘 <b>문법</b>이었다. 그런데 문법은 AI가 대신 짠다.</p>
    <div style="flex:1;display:flex;flex-direction:column;gap:10pt;justify-content:center;">
      <div style="background:var(--surface);border:1px dashed #B7C2D2;border-radius:9pt;padding:13pt 17pt;">
        <div style="display:flex;align-items:center;gap:10pt;margin-bottom:5pt;"><span style="display:inline-block;padding:2.5pt 8pt;background:#E3E8EF;color:var(--muted);border-radius:4pt;font-size:8.5pt;font-weight:700;">예전</span><p style="font-size:13pt;color:var(--ink);font-weight:700;">도구 선택 = "내가 이 문법을 짤 수 있는가?"</p></div>
        <p style="font-size:10.5pt;color:var(--muted);">→ 입문자는 쉬운 STATA로 도망쳤다.</p>
      </div>
      <div style="display:flex;justify-content:center;"><p style="font-size:15pt;color:var(--accent);font-weight:800;line-height:1.2;">↓</p></div>
      <div style="background:var(--navy);border-radius:9pt;padding:13pt 17pt;">
        <div style="display:flex;align-items:center;gap:10pt;margin-bottom:5pt;"><span style="display:inline-block;padding:2.5pt 8pt;background:var(--accent);color:#fff;border-radius:4pt;font-size:8.5pt;font-weight:700;">지금</span><p style="font-size:13pt;color:#fff;font-weight:700;">도구 선택 = "이 작업에 어느 생태계가 맞는가?"</p></div>
        <p style="font-size:10.5pt;color:#AFC4DE;">→ AI가 양쪽 문법을 다 짜주니, <b style="color:#fff;">일에 맞는 도구를 고른다.</b></p>
      </div>
    </div>
    <div style="margin-top:13pt;background:var(--soft);border-radius:8pt;padding:11pt 16pt;">
      <p style="font-size:11pt;color:var(--ink);font-weight:600;line-height:1.5;">문법이라는 <b>입장료를 AI가 대신 낸다</b> → 첫 시간부터 회귀·교차표·패널로 직행. "둘 다 입문이지만 오늘 <b class="k1">중급으로 도약</b>한다."</p>
    </div>
  </div>
</body>
</html>
