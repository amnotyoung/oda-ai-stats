<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#FFFFFF;--surface:#F4F7FB;--surface2:#EAF1F9;--ink:#1E2A3A;--ink2:#34465C;--muted:#6B7C90;--accent:#2563EB;--accent2:#1D4ED8;--soft:#DBEAFE;--border:#E2E8F0;--line:#D9E2EE;--navy:#16243A;--code-bg:#0E1A2B;--code-ink:#DCE6F2;--kw:#7DA9FF;--str:#8DE0A6;--com:#62758B;--num:#F4C36B;--fn:#C9A8FF;--op:#9FB4CC;--ok:#15A34A;--bad:#DC2626;}
body{width:720pt;height:405pt;overflow:hidden;position:relative;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);padding:24pt 32pt;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{letter-spacing:-0.02em;line-height:1.18;font-weight:700;color:var(--ink);}
p,li{line-height:1.55;color:var(--ink2);}
b,strong{color:var(--ink);font-weight:700;}
.k1{color:var(--accent);}
.rhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:13pt;flex-shrink:0;}
.rhead .l{display:flex;align-items:center;gap:9pt;}
.rhead h4{font-size:13pt;font-weight:700;color:var(--ink);}
.badge{display:inline-block;padding:3.5pt 8pt;background:var(--accent);color:#fff;border-radius:5pt;font-size:8.5pt;font-weight:700;letter-spacing:0.03em;}
.pg{font-size:9pt;color:var(--muted);font-weight:600;}
.body{flex:1;min-height:0;display:flex;flex-direction:column;}
.tag{display:inline-block;padding:3pt 9pt;border-radius:5pt;font-size:9pt;font-weight:700;letter-spacing:0.02em;}
.rq{background:var(--soft);border-radius:7pt;padding:8pt 13pt;margin-bottom:11pt;}
pre.code{background:var(--code-bg);border-radius:8pt;padding:11pt 14pt;color:var(--code-ink);font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,'Pretendard',monospace;font-size:8.8pt;line-height:1.6;overflow:hidden;white-space:pre-wrap;word-break:break-word;}
.code .c{color:var(--com);}.code .k{color:var(--kw);}.code .s{color:var(--str);}.code .n{color:var(--num);}.code .f{color:var(--fn);}.code .o{color:var(--op);}
</style>
</head>
<body>
  <div class="rhead"><div class="l"><span class="badge">MODULE 03</span><h4>③ 회귀 · 결과</h4></div><p class="pg">25 / 39</p></div>
  <div class="body">
    <h2 style="font-size:21pt;margin-bottom:9pt;">③ 회귀 코드와 결과 — <span class="k1">Preston 곡선</span></h2>
    <div class="rq"><p style="font-size:10.5pt;color:var(--accent2);font-weight:600;">🔎 연구질문 — 소득(log)이 기대수명을 얼마나 설명하는가?</p></div>
    <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:14pt;align-items:start;">
      <div style="display:flex;flex-direction:column;gap:9pt;">
        <div><span class="tag" style="background:var(--accent);color:#fff;">Python</span></div>
        <pre class="code">smf.<span class="f">ols</span>(<span class="s">"life_exp ~ log_gdp"</span>, data=df).<span class="f">fit</span>()</pre>
        <div><span class="tag" style="background:var(--navy);color:#fff;">STATA</span></div>
        <pre class="code"><span class="k">regress</span> life_exp log_gdp</pre>
      </div>
      <div style="display:flex;flex-direction:column;gap:10pt;">
        <div style="display:flex;gap:10pt;">
          <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:9pt;padding:11pt 14pt;">
            <p style="font-size:9pt;color:var(--muted);font-weight:700;margin-bottom:3pt;">소득 계수</p>
            <p style="font-size:27pt;font-weight:800;color:var(--accent);line-height:1.25;letter-spacing:-0.02em;">4.59</p>
            <p style="font-size:9pt;color:var(--ink2);">양수 · 유의</p>
          </div>
          <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:9pt;padding:11pt 14pt;">
            <p style="font-size:9pt;color:var(--muted);font-weight:700;margin-bottom:3pt;">설명력 R²</p>
            <p style="font-size:27pt;font-weight:800;color:var(--ink);line-height:1.25;letter-spacing:-0.02em;">0.68</p>
            <p style="font-size:9pt;color:var(--ink2);">설명력 높음</p>
          </div>
        </div>
        <div style="background:#EEF4FF;border:1px solid #BFD4F5;border-radius:9pt;padding:11pt 14pt;">
          <p style="font-size:10.5pt;color:var(--ink);line-height:1.5;"><b>→ 해석</b> — 소득↑ 기대수명↑. <b class="k1">Python·STATA 계수·R²가 정확히 일치.</b></p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
